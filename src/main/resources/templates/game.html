<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mastermind</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <script src="/static/js/dragAndDrop.js"></script>
</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <!-- Кнопка выхода в правом верхнем углу экрана -->
    <div th:if="${!isGuest}" class="fixed top-4 right-4 z-50">
        <a href="/mastermind/logout" class="bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-full text-sm flex items-center shadow-lg">
            <span class="mr-1">🚪</span> Log Out
        </a>
    </div>

    <!-- Фоновое видео -->
    <div class="video-background">
        <video autoplay loop muted playsinline>
            <source src="/static/materials/mylivewallpapers.com-Neon-Sunset.mp4" type="video/mp4">
            Browser does not support the video tag.
        </video>
    </div>

    <!-- Лидерборд -->
    <div class="leaderboard-container bg-white p-6 rounded shadow-lg">
        <h2 class="text-lg font-bold mb-4 text-center">🏆 Leader Board</h2>
        <div class="leaderboard flex flex-col items-center space-y-3">
            <div th:if="${topScores.size() > 0}" class="player first-place flex items-center gap-2">
                <span class="icon text-2xl">👑</span>
                <span class="name font-bold" th:text="${topScores.get(0).player}"></span>
                <span class="score" th:text="${topScores.get(0).points} + ' pts'"></span>
            </div>
            <hr class="separator">
            <div th:if="${topScores.size() > 1}" class="player second-place flex items-center gap-2">
                <span class="icon text-xl">🥈</span>
                <span class="name font-bold" th:text="${topScores.get(1).player}"></span>
                <span class="score" th:text="${topScores.get(1).points} + ' pts'"></span>
            </div>
            <hr class="separator">
            <div th:if="${topScores.size() > 2}" class="player third-place flex items-center gap-2">
                <span class="icon text-xl">🥉</span>
                <span class="name font-bold" th:text="${topScores.get(2).player}"></span>
                <span class="score" th:text="${topScores.get(2).points} + ' pts'"></span>
            </div>
        </div>
    </div>

    <!-- Основной контейнер игры -->
    <div class="game-container">
        <div class="bg-white p-6 rounded shadow-lg w-full max-w-md relative z-10 flex flex-col items-center">
            <h1 class="text-2xl font-bold mb-4 text-center">🎯 Mastermind</h1>

            <!-- Заменяем числовые input'ы на поле для игры с кружочками -->
            <div th:if="${!guessed}" class="flex flex-col space-y-4 items-center">
                <form th:action="@{/mastermind/play}" method="post" id="gameForm">
                    <!-- Скрытые поля для отправки значений -->
                    <input type="hidden" name="guess0" id="guess0">
                    <input type="hidden" name="guess1" id="guess1">
                    <input type="hidden" name="guess2" id="guess2">
                    <input type="hidden" name="guess3" id="guess3">

                    <!-- Палитра цветов -->
                    <div class="color-palette p-4 bg-gray-100 rounded-lg mb-4">
                        <h3 class="text-center mb-2 font-bold">Colors</h3>
                        <div class="grid grid-cols-5 gap-4">
                            <div class="color-circle" draggable="true" data-color="0" style="background-color: #DC2626"></div>
                            <div class="color-circle" draggable="true" data-color="1" style="background-color: #2563EB"></div>
                            <div class="color-circle" draggable="true" data-color="2" style="background-color: #059669"></div>
                            <div class="color-circle" draggable="true" data-color="3" style="background-color: #FBBF24"></div>
                            <div class="color-circle" draggable="true" data-color="4" style="background-color: #7C3AED"></div>
                            <div class="color-circle" draggable="true" data-color="5" style="background-color: #DB2777"></div>
                            <div class="color-circle" draggable="true" data-color="6" style="background-color: #FF7F50"></div>
                            <div class="color-circle" draggable="true" data-color="7" style="background-color: #B45309"></div>
                            <div class="color-circle" draggable="true" data-color="8" style="background-color: #00FF00"></div>
                            <div class="color-circle" draggable="true" data-color="9" style="background-color: #111827"></div>
                        </div>
                    </div>

                    <!-- Лунки для размещения кружочков -->
                    <div class="slots-container p-4 bg-gray-100 rounded-lg">
                        <div class="grid grid-cols-4 gap-4">
                            <div class="slot" data-slot="0"></div>
                            <div class="slot" data-slot="1"></div>
                            <div class="slot" data-slot="2"></div>
                            <div class="slot" data-slot="3"></div>
                        </div>
                    </div>

                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-6 rounded mt-4 w-full">
                        Check
                    </button>
                </form>
            </div>


            <!-- Кнопка "Играть снова" после победы -->
            <div th:if="${guessed}" class="flex flex-col items-center space-y-4">
                <div class="text-center text-green-600 font-bold">
                    🎉 Congrats, you guessed for [[${attempts}]] attempts!
                </div>
                <form th:action="@{/mastermind}" method="get">
                    <button type="submit" class="bg-green-500 hover:bg-green-600 text-white py-2 px-6 rounded">
                        Play again?
                    </button>
                </form>
            </div>

            <div class="mt-4">
                <h2 class="font-semibold">History:</h2>
                <div class="history-container">
                    <div th:each="entry : ${history}" class="history-item" th:utext="${entry}"></div>
                </div>
            </div>

            <div class="mt-4 text-center text-green-600 font-bold" th:if="${guessed}">
                🎉 Congrats, you guessed for [[${attempts}]] attempts!
            </div>

            <!-- Средний рейтинг -->
            <div class="mt-6 text-center">
                <h3 class="text-lg font-semibold">⭐ AVG reting</h3>
                <div class="text-2xl font-bold text-yellow-500">
                    [[${averageRating}]]/5
                </div>
            </div>
        </div>
    </div>

    <!-- Rating -->
    <div th:if="${!isGuest}" class="rating-container bg-white p-6 rounded shadow-lg">
        <form th:action="@{/mastermind/rate}" method="post" class="flex flex-col items-center space-y-2">
            <div class="text-center">
                <h3 class="font-semibold mb-2">Rate the game</h3>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" class="hidden">
                    <label for="star5" class="star"></label>
                    
                    <input type="radio" id="star4" name="rating" value="4" class="hidden">
                    <label for="star4" class="star"></label>
                    
                    <input type="radio" id="star3" name="rating" value="3" class="hidden">
                    <label for="star3" class="star"></label>
                    
                    <input type="radio" id="star2" name="rating" value="2" class="hidden">
                    <label for="star2" class="star"></label>
                    
                    <input type="radio" id="star1" name="rating" value="1" class="hidden">
                    <label for="star1" class="star"></label>
                </div>
            </div>
            <button type="submit" class="bg-yellow-500 hover:bg-yellow-600 text-white py-2 px-4 rounded w-full">
                Rate
            </button>
        </form>
    </div>


    <!-- ... комментарии  -->
    <div th:if="${isGuest}" class="comments-container comments-guest">
        <h2 class="text-lg font-bold mb-2">💬 Comments</h2>
        <div class="comments-box">
            <ul id="comments-list">
                <li th:each="comment : ${comments}" class="comment-item">
                    <span th:text="${comment.player}"></span>:
                    <span th:text="${comment.comment}"></span>
                    <span class="text-gray-500 text-xs" th:text="${#dates.format(comment.commentedOn, '  dd.MM.yyyy HH:mm')}"></span>
                </li>
            </ul>
        </div>
    </div>

    <div th:if="${isGuest}" class="register-container">
        <a href="/auth" class="bg-yellow-500 hover:bg-yellow-600 text-white py-1 px-4 rounded register-button">Log In</a>
    </div>

    <div th:if="${!isGuest}" class="comments-container comments-registered">
        <h2 class="text-lg font-bold mb-2">💬 Comments</h2>
        <div class="comments-box">
            <ul id="comments-list">
                <li th:each="comment : ${comments}" class="comment-item">
                    <span th:text="${comment.player}"></span>:
                    <span th:text="${comment.comment}"></span>
                    <span class="text-gray-500 text-xs" th:text="${#dates.format(comment.commentedOn, 'dd.MM.yyyy HH:mm')}"></span>
                </li>
            </ul>
        </div>

        <div class="comment-input">
            <form th:action="@{/mastermind/comment}" method="post" class="mt-2">
                <input type="text" name="comment" placeholder="Your comment..." class="border rounded px-2 py-1 w-full" required>
                <button type="submit" class="bg-green-500 hover:bg-green-600 text-white py-1 px-4 rounded send-button">Send</button>
            </form>
        </div>
    </div>

    <script th:if="${guessed}">
        // Функция для обновления лидерборда
        function updateLeaderboard() {
            fetch('/mastermind/leaderboard')
                .then(response => response.text())
                .then(html => {
                    const leaderboardContainer = document.querySelector('.leaderboard-container');
                    leaderboardContainer.innerHTML = html;
                });
        }

        // Обновляем лидерборд сразу после победы
        updateLeaderboard();
    </script>
</body>
</html>

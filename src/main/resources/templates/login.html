<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background-color: #4299e1;
      transition: transform 0.3s ease-in-out;
      border-radius: 0.375rem;
      z-index: 5; /* ниже кнопок */
    }
    .button-container button {
      z-index: 10;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white p-6 rounded shadow-lg w-full max-w-md">

  <!-- Удалён глобальный блок ошибок -->

  <!-- Кнопки входа/регистрации -->
  <div class="relative flex justify-center mb-6">
    <div class="absolute bg-blue-500 w-1/2 h-full rounded slider"
         th:classappend="${currentForm == 'signUp' ? 'translate-x-full' : 'translate-x-0'}">
    </div>

    <div class="button-container flex w-full">
      <button class="w-1/2 py-2 text-center" id="logInBtn">Log In</button>
      <button class="w-1/2 py-2 text-center" id="registerBtn">Register</button>
    </div>
  </div>

  <div id="formContainer">
    <!-- Форма входа (используется имя пользователя) -->
    <form th:action="@{/auth/login}" method="post" id="logInForm" class="space-y-4"
          th:classappend="${currentForm == 'signUp' ? 'hidden' : ''}">
      <!-- Ошибка отображается только если текущая форма входа -->
      <div th:if="${error != null and currentForm=='signIn'}" class="mb-4 px-4 py-2 bg-red-100 text-red-600 rounded">
        <p th:text="${error}"></p>
      </div>
      <div>
        <label for="username" class="block text-sm font-medium">Username</label>
        <input type="text" id="username" name="username" class="w-full border rounded px-3 py-2" required>
      </div>
      <div>
        <label for="password" class="block text-sm font-medium">Password</label>
        <input type="password" id="password" name="password" class="w-full border rounded px-3 py-2" required>
      </div>
      <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded">Log In</button>
    </form>

    <!-- Форма регистрации -->
    <form th:action="@{/auth/register}" method="post" id="registerForm" class="space-y-4 hidden"
          th:classappend="${currentForm == 'signUp' ? '' : 'hidden'}">
      <!-- Ошибка отображается, только если текущая форма регистрации -->
      <div th:if="${error != null and currentForm=='signUp'}" class="mb-4 px-4 py-2 bg-red-100 text-red-600 rounded">
        <p th:text="${error}"></p>
      </div>
      <div>
        <label for="username" class="block text-sm font-medium">Username</label>
        <input type="text" id="username" name="username" class="w-full border rounded px-3 py-2" required>
      </div>
      <div>
        <label for="email" class="block text-sm font-medium">Email</label>
        <input type="email" id="email" name="email" class="w-full border rounded px-3 py-2" required>
      </div>
      <div>
        <label for="password" class="block text-sm font-medium">Password</label>
        <input type="password" id="password" name="password" class="w-full border rounded px-3 py-2" required>
      </div>
      <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded">Register</button>
    </form>

    <!-- Форма для гостевого входа -->
    <form th:action="@{/auth/guest}" method="post" class="space-y-4 mt-4">
      <button type="submit" class="w-full bg-gray-500 hover:bg-gray-600 text-white py-2 rounded">Play as Guest</button>
    </form>
  </div>
</div>

<script th:inline="javascript">
  const currentForm = /*[[${currentForm}]]*/ 'signIn';
  const slider = document.querySelector('.slider');
  const logInForm = document.getElementById('logInForm');
  const registerForm = document.getElementById('registerForm');

  if (currentForm === 'signUp') {
    slider.style.transform = 'translateX(100%)';
    registerForm.classList.remove('hidden');
    logInForm.classList.add('hidden');
  } else {
    slider.style.transform = 'translateX(0)';
    logInForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  }

  document.getElementById('logInBtn').addEventListener('click', () => {
    slider.style.transform = 'translateX(0)';
    logInForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  });

  document.getElementById('registerBtn').addEventListener('click', () => {
    slider.style.transform = 'translateX(100%)';
    registerForm.classList.remove('hidden');
    logInForm.classList.add('hidden');
  });
</script>
</body>
</html>
